name: ci

on:
  push:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --group dev --extra magic

      - name: Run tests
        run: uv run pytest tests --cov=./herethere --cov-config=./.coveragerc --cov-report=xml

      - name: Check coverage report
        if: ${{ always() }}
        run: uv run coverage report -m

      - name: Run lint
        if: ${{ always() }}
        run: uv run ruff check herethere tests

      - name: Check formatting
        if: ${{ always() }}
        run: uv run ruff format --check herethere tests

      - name: Run pylint
        if: ${{ always() }}
        run: uv run pylint herethere

      - name: Build package
        if: ${{ always() }}
        run: uv run python -m build --sdist --wheel

      - name: Check distribution
        if: ${{ always() }}
        run: uv run twine check dist/*

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
